<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería - Examen Flask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#1d4ed8', // blue-700
                            medium: '#2563eb',  // blue-600
                            strong: '#1e40af',  // blue-800
                        },
                        neutral: {
                            primary: '#ffffff',
                            'primary-soft': '#f9fafb', // gray-50
                            'secondary-soft': '#f3f4f6', // gray-100
                        },
                        heading: '#111827', // gray-900
                        body: '#4b5563', // gray-600
                        default: '#e5e7eb', // gray-200
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-primary-soft text-body font-sans antialiased">
    
    <nav class="bg-gray-900 border-gray-700">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="/" class="flex items-center space-x-3">
                <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">🍕 Pizzería Web</span>
            </a>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-700 rounded-lg bg-gray-800 md:flex-row md:space-x-8 md:mt-0 md:border-0 md:bg-gray-900">
                    <li>
                        <a href="/" class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-blue-500 md:p-0">Capturar Pedido</a>
                    </li>
                    <li>
                        <a href="{{ url_for('ventas.por_dia') }}" class="block py-2 px-3 text-gray-300 rounded hover:bg-gray-700 md:hover:bg-transparent md:border-0 md:hover:text-blue-500 md:p-0">Ventas por Día</a>
                    </li>
                    <li>
                        <a href="{{ url_for('ventas.por_mes') }}" class="block py-2 px-3 text-gray-300 rounded hover:bg-gray-700 md:hover:bg-transparent md:border-0 md:hover:text-blue-500 md:p-0">Ventas por Mes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-10 pb-20">
        {% block container %}{% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
